<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Event Registration</title>
<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #f0f0f0;
    margin: 0;
    padding: 0;
}

body.dark-mode {
    background-color: #121212;
    color: #fff;
}

.navbar {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 15px;
    background: #fff;
}
body.dark-mode .navbar { background: #1e1e1e; }

.navbar a { text-decoration: none; color: #333; font-weight: bold; }
body.dark-mode .navbar a { color: #fff; }

.navbar button {
    cursor: pointer;
    border: none;
    background: #ddd;
    padding: 5px 10px;
    border-radius: 8px;
}
body.dark-mode .navbar button { background: #333; color: #fff; }

.form-container {
    max-width: 500px;
    margin: 50px auto;
    padding: 30px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}
body.dark-mode .form-container { background: #1e1e1e; }

.form-container input,
.form-container select {
    width: 100%;
    padding: 15px;
    margin-bottom: 20px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
}
body.dark-mode .form-container input,
body.dark-mode .form-container select {
    background: #2c2c2c;
    color: #fff;
    border: 1px solid #555;
}

.form-container button {
    display: block;
    margin: 0 auto;
    padding: 14px 40px;
    border: none;
    border-radius: 40px;
    font-weight: bold;
    background: linear-gradient(135deg, #FF9A9E, #A18CD1);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}
.form-container button:hover { transform: scale(1.05); }
</style>
</head>
<body>

<div class="navbar">
    <a href="index.html">Home</a>
    <a href="events.html">Events</a>
    <a href="register.html">Register</a>
    <a href="feedback.html">Feedback</a>
    <button onclick="toggleMode()">🌙</button>
</div>

<h2 style="text-align:center;">Event Registration</h2>

<div class="form-container">
    <form>
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <select name="event" required>
            <option value="">Select Event</option>
            <option>💻 Web Development Workshop</option>
            <option>🤖 AI Seminar</option>
            <option>🔐 Cyber Security Talk</option>
            <option>☁️ Cloud Computing Workshop</option>
            <option>🏆 Hackathon 2026</option>
            <option>🦾 Robotics Workshop</option>
            <option>📊 Data Science Bootcamp</option>
            <option>🎨 UI/UX Design Seminar</option>
            <option>🔗 Blockchain Basics</option>
        </select>
        <button type="submit">Register Now</button>
    </form>
</div>

<script>
function toggleMode() {
    document.body.classList.toggle("dark-mode");
    if(document.body.classList.contains("dark-mode")){
        localStorage.setItem("darkMode","enabled");
    } else {
        localStorage.setItem("darkMode","disabled");
    }
}

window.onload = function(){
    if(localStorage.getItem("darkMode") === "enabled"){
        document.body.classList.add("dark-mode");
    }
}
</script>

</body>
</html>
